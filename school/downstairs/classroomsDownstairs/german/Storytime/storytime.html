<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>Märchen raten</title>

    <script src="storytime.js" defer></script>

    <style>
      body {
        /* position: relative; */
        margin: 0;
        height: 100vh;
        font-family: Grundschrift, sans-serif;
        /* display: flex;
        flex-wrap: wrap; */
      }

      .container {
        max-width: 1400px;
        position: relative;
        margin: 0 auto;
        aspect-ratio: 3 / 2;
      }
      /* 
      img {
        position: absolute;
        top: 0;
        left: 0;
        margin: 0 auto;
        width: 100%;
        height: 100%;
      } */

      img {
        margin: 0 auto;
        width: 100%;
        /* height: 100%; */
      }

      #backBtn {
        position: fixed;
        top: 20px;
        left: 20px;
        padding: 10px 18px;
        font-size: 20px;
        border-radius: 10px;
        border: 3px solid white;
        background: rgba(0, 0, 0, 0.4);
        color: white;
        cursor: pointer;
        z-index: 1000;
      }

      #backBtn:hover {
        transform: scale(1.1);
      }

      #story {
        position: absolute;
        top: 20%;
        left: 15%;
        width: 31%;
        font-size: 1.4rem;
        line-height: 1.8;
        text-align: justify;
        height: 55%;
        overflow: scroll;
      }

      #right {
        position: absolute;
        top: 30%;
        left: 53%;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 30%;
      }

      input {
        font-size: 1.4rem;
        width: fit-content;
        border-radius: 10px;
        border: 2px solid #020202;
        text-align: center;
      }

      button {
        margin-top: 20px;
        font-size: 1.3rem;
        padding: 12px 30px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        background-color: transparent;
      }

      button:hover {
        background: #7cb342;
      }

      canvas {
        position: fixed;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 2000;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- <h1>📖 Welches Märchen ist das?</h1> -->
      <button id="backBtn">← Zurück</button>
      <img
        src="../../../../../pictures/Märchenbuch.jpeg"
        alt="Illustration eines Märchenbuchs"
      />

      <div id="story"></div>

      <div id="right">
        <input id="answer" type="text" placeholder="Wie heißt das Märchen?" />
        <button id="checkBtn">✅</button>
      </div>

      <canvas id="confetti"></canvas>
    </div>
  </body>
</html>
